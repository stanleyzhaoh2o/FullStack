<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Write your CSS Code here */
    .flag { 
      background-color: red;
      width: 900px;
      height: 600px;
      position: relative;
    }

    .flag div {
      background-color: blue;
      position: absolute;
      margin-top: 125px;
      width: 900px;
      height: 300px;
    }

    .flag div div {
      background-color: white;
      position: absolute;
      margin-left: 350px;
      margin-top: 50px;
      width: 200px;
      height:200px;
      border-radius: 50%;
    }

    .flag p {
      margin-top: 50px;
      margin-left: 350px;
      color:white;
      font-size: 50px;
      position: absolute;
    }

    .flag > div div p {
      color: black;
      position: absolute;
      margin-left: 70px;
    }
  </style>
</head>

<!-- 
  IMPORTANT! Do not change any HTML
Don't add any classes/ids/elements 
Use what you know about combining selectors 
and CSS specificity instead.
Hint 1: The flag is 900px by 600px and the circle is 200px by 200px.
Hint 2: You can use CSS inspection to get the colors from
https://appbrewery.github.io/flag-of-laos/
-->

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
