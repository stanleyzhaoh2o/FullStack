<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */

    .container {
      width: 748px;
      height: 748px;
      display: grid;
      grid-template-columns: 320px 198px 153px 50px;
      grid-template-rows: 414px 130px 155px 20px;
    }

    .red {
      background: red;
    }

    .white1 {
      background: white;
      grid-column: span 3;
    }

    .white2 {
      background: white;
      grid-row: span 2;
    }

    .white3 {
      background: white;
      grid-area: 2 / 2 / 4 / 4;
    }

    .blue {
      background: blue;
    }

    .white4 {
      grid-row: span 2;
    }
    
    .yellow {
      background: yellow;
    }
    .black {
      background: black;
    }

    .item {
      background-color: #F0F1EC;
    }
  </style>
</head>

<body>
  <!-- Write your HTML here -->
  <div class="container">
  <div class="red"></div>
  <div class="white1"></div>
  <div class="white2"></div>
  <div class="white3"></div>

  <div class="blue"></div>
  <div class="white4"></div>
  <div class="item"></div>
  <div class="yellow"></div>
  <div class="black"></div>
  </div>
</body>
